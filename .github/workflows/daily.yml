name: Daily Digest Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC = 7am CET = 8am CST (DST)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update index.html
        run: |
          date_str=$(date '+%Y-%m-%d')
          if ! grep -q "<!-- DAY: $date_str -->" index.html 2>/dev/null; then
            # Add marker for today's entry
            echo "<!-- DAY: $date_str -->" >> index.html
          fi

      - name: Commit and push
        run: |
          git config user.name "daily-digest-bot"
          git config user.email "bot@daily-digest"
          git add -A
          git diff --staged --quiet || git commit -m "Update: $(date '+%Y-%m-%d %H:%M')"
          git push
