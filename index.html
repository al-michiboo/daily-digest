<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest — Micky Yun Chan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    header { text-align: center; margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid #21262d; }
    header h1 { font-size: 2rem; color: #58a6ff; }
    header p { color: #8b949e; margin-top: 0.5rem; }
    .updated { color: #3fb950; font-size: 0.85rem; }
    h2 { color: #58a6ff; margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 0.5rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h3 { color: #f0883e; margin-bottom: 0.5rem; font-size: 1rem; }
    .card .meta { font-size: 0.75rem; color: #8b949e; margin-bottom: 0.75rem; }
    .card .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .tag { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; padding: 0.1rem 0.5rem; border-radius: 20px; font-size: 0.7rem; }
    .tag.dutch { background: #3fb95022; color: #3fb950; border-color: #3fb95044; }
    .card p { font-size: 0.9rem; color: #c9d1d9; }
    .card ul { margin: 0.75rem 0 0.75rem 1.25rem; font-size: 0.88rem; color: #c9d1d9; }
    .card li { margin-bottom: 0.3rem; }
    .day-badge { background: #f0883e; color: #0d1117; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 0.5rem; }
    .dutch-card { border-left: 3px solid #3fb950; }
    .dutch-card h3 { color: #3fb950; }
    .section-sep { margin: 2rem 0; border: none; border-top: 1px dashed #30363d; }
    .empty { color: #8b949e; font-style: italic; padding: 1rem; }
    @media (max-width: 600px) { .container { padding: 1rem 0.5rem; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Daily Digest</h1>
      <p>Micky Yun Chan — CTF Writeups &amp; Dutch A2 Study</p>
      <p class="updated">Last updated: al-michiboo via CI/CD</p>
    </header>
    <h2>🛡️ CTF Writeups</h2>
    <div id="ctf-content"><p class="empty">Loading...</p></div>

    <hr class="section-sep">

    <h2>🇳🇱 Dutch A2 Study</h2>
    <div id="dutch-content"><p class="empty">Loading...</p></div>
  </div>
  <script>
    // Auto-refresh every 5 minutes to pick up new commits
    setTimeout(() => location.reload(), 300000);
  </script>
</body>
</html>
